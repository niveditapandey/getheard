<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients — GetHeard Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050d1f;
      --card: #0a1628;
      --card-border: rgba(255,255,255,0.08);
      --accent: #3b82f6;
      --accent-bright: #60a5fa;
      --text: rgba(255,255,255,0.92);
      --text-muted: rgba(255,255,255,0.58);
      --text-dim: rgba(255,255,255,0.35);
      --input-bg: #0f1f3a;
      --glow: rgba(59,130,246,0.15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      min-width: 200px;
      background: var(--card);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      padding: 24px 0 16px;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 0 20px 24px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .sidebar-logo a { text-decoration: none; color: var(--text); }
    .sidebar-logo .accent { color: var(--accent-bright); }

    .nav-section-label {
      padding: 16px 20px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .nav-item {
      display: block;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s, background 0.15s;
      border-left: 2px solid transparent;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item.active {
      color: var(--accent-bright);
      border-left-color: var(--accent-bright);
      background: var(--glow);
      font-weight: 500;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px 0;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Main ── */
    .main {
      margin-left: 200px;
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      padding: 36px 40px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-input {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 9px 14px;
      width: 260px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--accent); }

    /* ── Table Card ── */
    .table-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      border-bottom: 1px solid var(--card-border);
    }

    th {
      padding: 12px 16px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: left;
    }

    td {
      padding: 13px 16px;
      font-size: 13px;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover td { background: rgba(255,255,255,0.03); }

    td.primary { color: var(--text); font-weight: 500; }

    .btn-view {
      display: inline-block;
      padding: 5px 14px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--accent-bright);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-view:hover {
      background: var(--glow);
      border-color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 56px 20px;
      color: var(--text-dim);
      font-size: 14px;
    }

    #loading-row td {
      color: var(--text-dim);
      font-size: 13px;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo"><a href="/admin"><span class="accent">Get</span>Heard</a></div>
    <div class="nav-section-label">ADMIN</div>
    <a href="/admin" class="nav-item">≡ Overview</a>
    <a href="/admin/studies" class="nav-item">▦ Studies</a>
    <a href="/admin/respondents" class="nav-item">👥 Panel</a>
    <div class="nav-section-label">SALES</div>
    <a href="/admin/pipeline" class="nav-item">&#127919; Pipeline</a>
    <div class="nav-section-label">FINANCE</div>
    <a href="/admin/pricing" class="nav-item">💰 Pricing</a>
    <a href="/admin/payouts" class="nav-item">⟳ Payouts</a>
    <a href="/admin/reports" class="nav-item">▣ Reports</a>
    <div class="nav-section-label">SYSTEM</div>
    <a href="/admin/clients" class="nav-item active">👤 Clients</a>
    <a href="/admin/settings" class="nav-item">⚙ Settings</a>
    <a href="/admin/logout" class="nav-item">← Log Out</a>
    <div class="sidebar-footer">GetHeard Admin v1.0</div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Clients</h1>
    </div>

    <div class="toolbar">
      <input
        type="text"
        id="search"
        class="search-input"
        placeholder="Search by name or company…"
        oninput="filterRows()"
      />
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Company</th>
            <th>Country</th>
            <th>Studies</th>
            <th>Joined</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="clients-body">
          <tr id="loading-row"><td colspan="6">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    let allClients = [];

    function formatDate(ts) {
      if (!ts) return '—';
      const d = new Date(ts._seconds ? ts._seconds * 1000 : ts);
      if (isNaN(d)) return ts;
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function renderRows(clients) {
      const tbody = document.getElementById('clients-body');
      if (!clients.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:48px 20px;color:var(--text-dim);">No clients yet</td></tr>';
        return;
      }
      tbody.innerHTML = clients.map(c => `
        <tr data-search="${(c.name || '').toLowerCase()} ${(c.company || '').toLowerCase()}">
          <td class="primary">${c.name || '—'}</td>
          <td>${c.company || '—'}</td>
          <td>${c.country || '—'}</td>
          <td>${c.study_count ?? '—'}</td>
          <td>${formatDate(c.created_at || c.joined)}</td>
          <td><a class="btn-view" href="/admin/clients/${c.id || c.client_id}">View</a></td>
        </tr>
      `).join('');
    }

    function filterRows() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const filtered = q
        ? allClients.filter(c =>
            (c.name || '').toLowerCase().includes(q) ||
            (c.company || '').toLowerCase().includes(q)
          )
        : allClients;
      renderRows(filtered);
    }

    async function loadClients() {
      try {
        const res = await fetch('/api/admin/clients');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        allClients = Array.isArray(data) ? data : (data.clients || []);
        renderRows(allClients);
      } catch (err) {
        console.error('Failed to load clients:', err);
        document.getElementById('clients-body').innerHTML =
          '<tr><td colspan="6" style="text-align:center;padding:48px 20px;color:var(--text-dim);">Failed to load clients</td></tr>';
      }
    }

    loadClients();
  </script>
</body>
</html>
