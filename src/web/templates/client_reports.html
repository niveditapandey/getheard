<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports – GetHeard Client</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:           #050d1f;
    --card:         #0a1628;
    --card-border:  rgba(255,255,255,0.08);
    --muted:        #1e2d45;
    --accent:       #3b82f6;
    --accent-bright:#60a5fa;
    --text:         rgba(255,255,255,0.92);
    --text-muted:   rgba(255,255,255,0.58);
    --text-dim:     rgba(255,255,255,0.35);
    --input-bg:     #0f1f3a;
    --input-border: rgba(255,255,255,0.1);
    --glow:         rgba(59,130,246,0.15);
    --danger:       #f87171;
    --success:      #10d48e;
    --warning:      #f59e0b;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -20%;
    right: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  nav {
    background: rgba(5,13,31,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 56px;
    border-bottom: 1px solid var(--card-border);
    position: relative;
    z-index: 10;
  }
  nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 6px;
    transition: background .2s, color .2s;
  }
  nav a:hover, nav a.active {
    background: rgba(59,130,246,0.12);
    color: var(--accent-bright);
  }
  .nav-brand { color: var(--text); font-weight: 700; font-size: 16px; margin-right: 16px; }
  .nav-brand .accent { color: var(--accent-bright); }

  .page { max-width: 900px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }
  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; color: var(--text); }
  .page-header p { font-size: 14px; color: var(--text-muted); }

  .section {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--card-border);
  }
  .section-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-header h2 { font-size: 16px; font-weight: 700; color: var(--text); }
  .section-body { padding: 20px 24px; }

  .report-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    margin-bottom: 8px;
    transition: border-color .2s, background .2s;
  }
  .report-row:last-child { margin-bottom: 0; }
  .report-row:hover {
    border-color: rgba(59,130,246,0.3);
    background: rgba(59,130,246,0.04);
  }
  .report-name { font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 3px; }
  .report-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; flex-wrap: wrap; }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover {
    background: #2563eb;
    box-shadow: 0 0 16px var(--glow);
  }
  .btn-outline {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--card-border);
  }
  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent-bright);
  }

  .key-stat {
    font-size: 12px;
    background: rgba(59,130,246,0.15);
    color: var(--accent-bright);
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 500;
    max-width: 340px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .empty { text-align: center; padding: 48px; color: var(--text-dim); font-size: 14px; }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <span class="nav-brand"><span class="accent">Get</span>Heard</span>
  <a href="/listen">Dashboard</a>
  <a href="/listen/reports" class="active">Reports</a>
  <a href="/listen/logout">Sign Out</a>
</nav>
<div class="page">
  <div class="page-header">
    <h1>Research Reports</h1>
    <p>Generated reports for your studies</p>
  </div>
  <div class="section">
    <div class="section-header">
      <h2>Reports</h2>
      <span id="reportCount" style="font-size:13px;color:var(--text-muted)"></span>
    </div>
    <div class="section-body" id="reportsList">
      <div class="empty"><span class="spinner"></span></div>
    </div>
  </div>
</div>
<script>
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function formatDate(iso){
  if(!iso)return '';
  return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

async function load(){
  const res = await fetch('/api/client/reports');
  if(!res.ok){
    document.getElementById('reportsList').innerHTML='<div class="empty">Could not load reports.</div>';
    return;
  }
  const {reports} = await res.json();
  const el = document.getElementById('reportsList');
  document.getElementById('reportCount').textContent = reports.length ? `${reports.length} report${reports.length!==1?'s':''}` : '';
  if(!reports.length){
    el.innerHTML='<div class="empty">No reports yet. Interviews need to be completed and a report generated first.</div>';
    return;
  }
  el.innerHTML = reports.map(r=>`
    <div class="report-row">
      <div>
        <div class="report-name">${escHtml(r.project_name||'Report')}</div>
        <div class="report-meta">
          <span>📅 ${formatDate(r.generated_at)}</span>
          <span>👥 ${r.total_transcripts||0} respondents</span>
          ${r.key_stat?`<span class="key-stat">💡 ${escHtml(r.key_stat)}</span>`:''}
        </div>
      </div>
      <a href="/report/${r.report_id}" class="btn btn-primary" target="_blank">View Report →</a>
    </div>
  `).join('');
}

load().catch(()=>{
  document.getElementById('reportsList').innerHTML='<div class="empty">Error loading reports.</div>';
});
</script>
</body>
</html>
