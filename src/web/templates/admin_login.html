<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — GetHeard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #050d1f;
      --card:         #0a1628;
      --card-border:  rgba(255,255,255,0.08);
      --muted:        #1e2d45;
      --accent:       #3b82f6;
      --accent-bright:#60a5fa;
      --text:         rgba(255,255,255,0.92);
      --text-muted:   rgba(255,255,255,0.58);
      --text-dim:     rgba(255,255,255,0.35);
      --input-bg:     #0f1f3a;
      --input-border: rgba(255,255,255,0.1);
      --glow:         rgba(59,130,246,0.15);
      --danger:       #f87171;
      --success:      #10d48e;
      --warning:      #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: var(--text);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      top: -150px; right: -150px;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .admin-badge {
      text-align: center;
      margin-bottom: 24px;
    }
    .admin-badge a {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: block;
      margin-bottom: 8px;
    }
    .admin-badge a .accent { color: var(--accent-bright); }
    .badge-pill {
      display: inline-block;
      background: rgba(96,165,250,0.12);
      color: var(--accent-bright);
      border: 1px solid rgba(96,165,250,0.25);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 40px 40px 36px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.5);
    }
    @media (max-width: 440px) { .login-card { padding: 28px 20px 24px; } }

    .card-header {
      margin-bottom: 28px;
    }
    .card-header h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .alert-error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--danger);
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--input-bg);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      appearance: none;
      -webkit-appearance: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }
    input::placeholder { color: var(--text-dim); }
    input.invalid { border-color: var(--danger); }

    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 42px; }
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      padding: 4px;
      font-size: 0.85rem;
      transition: color 0.15s;
    }
    .eye-btn:hover { color: var(--accent-bright); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.18s, box-shadow 0.18s, transform 0.15s;
    }
    .btn-submit:hover {
      background: var(--accent-bright);
      box-shadow: 0 6px 20px rgba(59,130,246,0.35);
      transform: translateY(-1px);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      border: none;
      border-top: 1px solid var(--card-border);
      margin: 22px 0 16px;
    }

    .back-link {
      text-align: center;
      font-size: 0.82rem;
    }
    .back-link a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }
    .back-link a:hover { color: var(--accent-bright); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <div class="admin-badge">
      <a href="/"><span class="accent">Get</span>Heard</a>
      <div class="badge-pill">Admin Portal</div>
    </div>

    <div class="login-card">
      <div class="card-header">
        <h1>Admin Login</h1>
        <p>Restricted access. Authorised personnel only.</p>
      </div>

      <div id="error-banner" class="alert-error" style="display:none;">
        <span>&#9888;</span>
        <span>Invalid username or password. Please try again.</span>
      </div>

      <form id="admin-form" method="POST" action="/admin/login" novalidate>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="admin" required autocomplete="username" autofocus />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password"
                   placeholder="Enter password"
                   required autocomplete="current-password" />
            <button type="button" class="eye-btn" onclick="togglePwd()" aria-label="Toggle password">&#128065;</button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Log In to Admin</button>

      </form>

      <hr class="divider" />
      <div class="back-link"><a href="/">&#8592; Back to GetHeard</a></div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
      document.getElementById('error-banner').style.display = 'flex';
    }

    function togglePwd() {
      const inp = document.getElementById('password');
      const btn = document.querySelector('.eye-btn');
      if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '&#128584;'; }
      else { inp.type = 'password'; btn.innerHTML = '&#128065;'; }
    }

    document.getElementById('admin-form').addEventListener('submit', function(e) {
      const u = document.getElementById('username');
      const p = document.getElementById('password');
      if (!u.value.trim() || !p.value) {
        e.preventDefault();
        u.classList.toggle('invalid', !u.value.trim());
        p.classList.toggle('invalid', !p.value);
        return;
      }
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';
    });

    ['username','password'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        this.classList.remove('invalid');
        document.getElementById('error-banner').style.display = 'none';
      });
    });
  </script>
</body>
</html>
