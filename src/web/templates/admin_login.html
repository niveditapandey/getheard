<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — GetHeard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:       #1e3c72;
      --navy-dark:  #152d56;
      --blue:       #2a5298;
      --blue-light: #4facfe;
      --accent:     #60a5fa;
      --off-white:  #e8edf5;
      --white:      #ffffff;
      --muted:      #8fa3c8;
      --danger:     #dc2626;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--navy-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #1a2540;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, var(--navy-dark) 0%, #162848 60%, #1a3566 100%);
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,172,254,0.06) 0%, transparent 70%);
      top: -100px; right: -100px;
      z-index: 0;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
    }

    .admin-badge {
      text-align: center;
      margin-bottom: 24px;
    }
    .admin-badge a {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: block;
      margin-bottom: 6px;
    }
    .admin-badge a span { color: var(--blue-light); }
    .badge-pill {
      display: inline-block;
      background: rgba(79,172,254,0.15);
      color: var(--blue-light);
      border: 1px solid rgba(79,172,254,0.3);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .login-card {
      background: var(--white);
      border-radius: 18px;
      padding: 40px 40px 36px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
    }
    @media (max-width: 440px) { .login-card { padding: 28px 20px 24px; } }

    .card-header {
      margin-bottom: 28px;
    }
    .card-header h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .card-header p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .alert-error {
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #c5d2e8;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #1a2540;
      background: var(--white);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      appearance: none;
      -webkit-appearance: none;
    }
    input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(30,60,114,0.12);
    }
    input::placeholder { color: var(--muted); }
    input.invalid { border-color: var(--danger); }

    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 42px; }
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      font-size: 0.85rem;
    }
    .eye-btn:hover { color: var(--navy); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 9px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.18s, box-shadow 0.18s, transform 0.15s;
    }
    .btn-submit:hover {
      background: var(--navy-dark);
      box-shadow: 0 6px 20px rgba(30,60,114,0.3);
      transform: translateY(-1px);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider {
      border: none;
      border-top: 1px solid #e8edf5;
      margin: 22px 0 16px;
    }

    .back-link {
      text-align: center;
      font-size: 0.82rem;
    }
    .back-link a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
    }
    .back-link a:hover { color: var(--navy); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">

    <div class="admin-badge">
      <a href="/"><b>Get</b><span>Heard</span></a>
      <div class="badge-pill">Admin Portal</div>
    </div>

    <div class="login-card">
      <div class="card-header">
        <h1>Admin Login</h1>
        <p>Restricted access. Authorised personnel only.</p>
      </div>

      <div id="error-banner" class="alert-error" style="display:none;">
        <span>&#9888;</span>
        <span>Invalid username or password. Please try again.</span>
      </div>

      <form id="admin-form" method="POST" action="/admin/login" novalidate>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="admin" required autocomplete="username" autofocus />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password"
                   placeholder="Enter password"
                   required autocomplete="current-password" />
            <button type="button" class="eye-btn" onclick="togglePwd()" aria-label="Toggle password">&#128065;</button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Log In to Admin</button>

      </form>

      <hr class="divider" />
      <div class="back-link"><a href="/">&#8592; Back to GetHeard</a></div>
    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
      document.getElementById('error-banner').style.display = 'flex';
    }

    function togglePwd() {
      const inp = document.getElementById('password');
      const btn = document.querySelector('.eye-btn');
      if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '&#128584;'; }
      else { inp.type = 'password'; btn.innerHTML = '&#128065;'; }
    }

    document.getElementById('admin-form').addEventListener('submit', function(e) {
      const u = document.getElementById('username');
      const p = document.getElementById('password');
      if (!u.value.trim() || !p.value) {
        e.preventDefault();
        u.classList.toggle('invalid', !u.value.trim());
        p.classList.toggle('invalid', !p.value);
        return;
      }
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';
    });

    ['username','password'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        this.classList.remove('invalid');
        document.getElementById('error-banner').style.display = 'none';
      });
    });
  </script>
</body>
</html>
