<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — GetHeard</title>
  <meta name="client-name" id="clientNameMeta" content="" />
  <meta name="client-company" id="clientCompanyMeta" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #050d1f;
      --bg-card:      #0a1628;
      --bg-card-2:    #1e2d45;
      --bg-input:     #0f1f3a;
      --sidebar-bg:   #050d1f;
      --border:       rgba(255,255,255,0.08);
      --border-blue:  rgba(59,130,246,0.25);
      --blue:         #3b82f6;
      --blue-bright:  #60a5fa;
      --blue-glow:    rgba(59,130,246,0.15);
      --text:         rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.58);
      --text-muted:   rgba(255,255,255,0.35);
      --success:      #10d48e;
      --warning:      #f59e0b;
      --danger:       #f87171;
      --sidebar-w:    220px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      min-height: 100vh;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-logo {
      padding: 22px 20px 18px;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      display: block;
    }
    .sidebar-logo .dot { color: var(--blue); }

    .sidebar-nav { flex: 1; padding: 12px 0; }

    .nav-section-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      padding: 12px 20px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .nav-item:hover {
      background: rgba(59,130,246,0.06);
      color: var(--text);
      text-decoration: none;
    }
    .nav-item.active {
      background: rgba(59,130,246,0.1);
      color: var(--blue);
      border-left-color: var(--blue);
      font-weight: 600;
    }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .sidebar-company {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .sidebar-company strong {
      display: block;
      color: var(--text-secondary);
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── MAIN ── */
    .app-main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* Topbar */
    .topbar {
      background: rgba(5,13,31,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 36px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-greeting {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }
    .topbar-greeting .name { color: var(--blue); }
    .refresh-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-left: 8px;
      animation: pulse 2.5s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    .btn-new-study {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue);
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity .18s, box-shadow .18s, transform .15s;
      letter-spacing: 0.01em;
    }
    .btn-new-study:hover {
      opacity: 0.9;
      box-shadow: 0 6px 20px rgba(59,130,246,0.35);
      transform: translateY(-1px);
      text-decoration: none;
      color: #fff;
    }

    /* Page content */
    .page-content { padding: 32px 36px; flex: 1; }

    /* Section label */
    .section-eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--blue);
      margin-bottom: 20px;
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 22px 24px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card:nth-child(1)::before { background: var(--blue); }
    .stat-card:nth-child(2)::before { background: var(--success); }
    .stat-card:nth-child(3)::before { background: #a78bfa; }
    .stat-card:hover { border-color: var(--border-blue); }

    .stat-val {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .stat-card:nth-child(1) .stat-val { color: var(--blue); }
    .stat-card:nth-child(2) .stat-val { color: var(--success); }
    .stat-card:nth-child(3) .stat-val { color: #a78bfa; }
    .stat-lbl {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    /* ── TABLE CARD ── */
    .table-card {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .table-card-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .table-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    thead { background: rgba(255,255,255,0.03); }
    thead th {
      padding: 11px 20px;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody td {
      padding: 15px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-secondary);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(59,130,246,0.04); }

    /* Status Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .badge-pending        { background: rgba(59,130,246,0.1);  color: var(--blue); }
    .badge-briefing       { background: rgba(59,130,246,0.1);  color: var(--blue); }
    .badge-pricing        { background: rgba(59,130,246,0.1);  color: var(--blue); }
    .badge-panel_building { background: rgba(167,139,250,0.1); color: #a78bfa; }
    .badge-interviewing   { background: rgba(16,212,142,0.1);  color: var(--success); }
    .badge-analysis       { background: rgba(245,158,11,0.1);  color: var(--warning); }
    .badge-completed      { background: rgba(16,212,142,0.1);  color: var(--success); }
    .badge-cancelled      { background: rgba(248,113,113,0.1); color: var(--danger); }

    .btn-view {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      background: rgba(59,130,246,0.1);
      color: var(--blue);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 7px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .btn-view:hover {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      text-decoration: none;
    }

    /* Empty / loading */
    .empty-state {
      text-align: center;
      padding: 64px 32px;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.3; }
    .empty-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-sub {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 24px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-cell {
      padding: 52px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .spin-icon {
      width: 28px; height: 28px;
      border: 2px solid rgba(59,130,246,0.15);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .app-main { margin-left: 0; }
      .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
      .sidebar.open { transform: translateX(0); }
      .topbar { padding: 0 20px; }
      .page-content { padding: 20px 16px; }
    }
    @media (max-width: 500px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <a href="/listen" class="sidebar-logo"><span style="color:var(--blue)">Get</span>Heard</a>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="/listen" class="nav-item active">
        <span class="nav-icon">⊞</span> Dashboard
      </a>
      <a href="/listen/studies" class="nav-item">
        <span class="nav-icon">📊</span> My Studies
      </a>
      <a href="/listen/panel" class="nav-item">
        <span class="nav-icon">👥</span> Panel
      </a>
      <a href="/listen/reports" class="nav-item">
        <span class="nav-icon">📄</span> Reports
      </a>
      <div class="nav-section-label">Account</div>
      <a href="/listen/billing" class="nav-item">
        <span class="nav-icon">💳</span> Billing
      </a>
      <a href="/listen/settings" class="nav-item">
        <span class="nav-icon">⚙</span> Settings
      </a>
      <a href="/listen/logout" class="nav-item" style="margin-top:4px">
        <span class="nav-icon">←</span> Log Out
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-company">
        Logged in as
        <strong id="sidebar-company-name">—</strong>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="app-main">

    <header class="topbar">
      <div class="topbar-greeting">
        <span id="greeting-text">Good morning</span>,&nbsp;
        <span class="name" id="client-firstname">—</span>
        <span class="refresh-dot" title="Auto-refreshing"></span>
      </div>
      <a href="/agent/brief" class="btn-new-study">+ New Study</a>
    </header>

    <div class="page-content">

      <div class="section-eyebrow">Overview</div>

      <!-- STATS -->
      <div class="stats-row" id="stats-row">
        <div class="stat-card">
          <div class="stat-val" id="stat-active">—</div>
          <div class="stat-lbl">Active Studies</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-completed">—</div>
          <div class="stat-lbl">Completed Studies</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-respondents">—</div>
          <div class="stat-lbl">Respondents Interviewed</div>
        </div>
      </div>

      <!-- STUDIES TABLE -->
      <div class="table-card">
        <div class="table-card-header">
          <div class="table-card-title">Your Studies</div>
          <a href="/agent/brief" class="btn-view">+ New Study</a>
        </div>
        <div id="studies-container">
          <div class="spinner-cell">
            <div class="spin-icon"></div>
            Loading studies&hellip;
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const hour = new Date().getHours();
    const greetWord = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting-text').textContent = greetWord;

    // Name populated from /api/client/stats in loadDashboard()

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' }); }
      catch(e) { return iso; }
    }
    const STATUS_LABELS = {
      pending:'Pending', briefing:'Briefing', pricing:'Pricing',
      panel_building:'Panel Building', interviewing:'Interviewing',
      analysis:'Analysis', completed:'Completed', cancelled:'Cancelled',
    };
    function statusBadge(raw) {
      const s = (raw||'pending').toLowerCase().replace(/\s+/g,'_');
      const label = STATUS_LABELS[s] || (s.charAt(0).toUpperCase()+s.slice(1));
      return `<span class="badge badge-${esc(s)}">${esc(label)}</span>`;
    }

    async function loadDashboard() {
      try {
        const statsRes = await fetch('/api/client/stats');
        if (statsRes.ok) {
          const stats = await statsRes.json();
          document.getElementById('stat-active').textContent      = stats.active_studies ?? '—';
          document.getElementById('stat-completed').textContent   = stats.completed_studies ?? '—';
          document.getElementById('stat-respondents').textContent = stats.respondents_interviewed ?? '—';
          // Populate name from API (not template vars)
          const name    = stats.client_name || stats.client || 'Client';
          const company = stats.company || name;
          const firstName = name.split(' ')[0] || name;
          document.getElementById('client-firstname').textContent     = firstName;
          document.getElementById('sidebar-company-name').textContent = company;
        }
      } catch(e) {}

      try {
        const projRes = await fetch('/api/client/projects');
        if (!projRes.ok) throw new Error('not ok');
        const data = await projRes.json();
        renderStudies(data.projects || data || []);
      } catch(e) {
        renderStudiesError();
      }
    }

    function renderStudies(projects) {
      const container = document.getElementById('studies-container');
      if (!projects.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <div class="empty-title">No studies yet</div>
            <div class="empty-sub">Your research studies will appear here once you create one.</div>
            <a href="/agent/brief" class="btn-new-study" style="display:inline-flex;gap:8px;padding:12px 24px;margin-top:4px">
              + Start your first study
            </a>
          </div>`;
        return;
      }
      const rows = projects.map(p => {
        const id          = p.id || p.project_id || '';
        const name        = esc(p.name || p.project_name || 'Untitled Study');
        const type        = esc(p.research_type || p.type || 'Survey');
        const respondents = p.respondent_count ?? p.respondents ?? '—';
        const created     = fmtDate(p.created_at);
        const badge       = statusBadge(p.status);
        return `<tr>
          <td><span style="font-weight:600;color:var(--text);">${name}</span></td>
          <td><span style="font-size:0.78rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">${type}</span></td>
          <td>${badge}</td>
          <td style="text-align:center;color:var(--text);font-weight:600;">${respondents}</td>
          <td style="color:var(--text-muted);font-size:0.82rem;">${created}</td>
          <td><a href="/listen/study/${encodeURIComponent(id)}" class="btn-view">View →</a></td>
        </tr>`;
      }).join('');
      container.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Study Name</th><th>Type</th><th>Status</th>
              <th style="text-align:center">Respondents</th><th>Created</th><th>Action</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function renderStudiesError() {
      document.getElementById('studies-container').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠</div>
          <div class="empty-title">Could not load studies</div>
          <div class="empty-sub">Please refresh or try again in a moment.</div>
        </div>`;
    }

    loadDashboard();
    setInterval(loadDashboard, 10000);
  </script>
</body>
</html>
