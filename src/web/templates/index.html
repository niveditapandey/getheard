<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetHeard – Voice Interview Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:#050d1f;--card:#0a1628;--card-border:rgba(255,255,255,0.08);
      --muted:#1e2d45;--accent:#3b82f6;--accent-bright:#60a5fa;
      --text:rgba(255,255,255,0.92);--text-muted:rgba(255,255,255,0.58);
      --text-dim:rgba(255,255,255,0.35);--input-bg:#0f1f3a;
      --input-border:rgba(255,255,255,0.1);--glow:rgba(59,130,246,0.15);
      --danger:#f87171;--success:#10d48e;--warning:#f59e0b;--radius:16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }
    body::before {
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
      background-size:60px 60px;
    }
    body::after {
      content:'';position:fixed;top:0;right:0;width:60vw;height:60vh;
      pointer-events:none;z-index:0;
      background:radial-gradient(circle,rgba(59,130,246,0.1) 0%,transparent 60%);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 620px;
      padding: 40px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 2.4rem; }
    h1 {
      font-size: 1.75rem; font-weight: 800; margin-bottom: 4px;
    }
    .wordmark .accent { color: var(--accent-bright); }
    .tagline { color: var(--text-muted); font-size: .9rem; }

    /* ── Language picker ── */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }
    .lang-btn {
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      border-radius: 12px;
      padding: 10px 8px;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: all .2s;
      text-align: center;
      font-family: 'Inter', sans-serif;
    }
    .lang-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(59,130,246,0.08); }
    .lang-btn.active {
      border-color: var(--accent);
      background: rgba(59,130,246,0.15);
      color: var(--accent-bright);
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-weight: 500;
      font-size: .9rem;
      transition: background .3s, color .3s;
      border: 1px solid transparent;
    }
    .status-bar.idle     { background: var(--muted); color: var(--text-muted); border-color: var(--card-border); }
    .status-bar.ready    { background: rgba(16,212,142,0.12); color: var(--success); border-color: rgba(16,212,142,0.25); }
    .status-bar.listening{ background: rgba(245,158,11,0.12); color: var(--warning); border-color: rgba(245,158,11,0.25); }
    .status-bar.thinking { background: rgba(59,130,246,0.12); color: var(--accent-bright); border-color: var(--glow); }
    .status-bar.speaking { background: rgba(59,130,246,0.12); color: var(--accent-bright); border-color: var(--glow); }
    .status-bar.done     { background: rgba(16,212,142,0.12); color: var(--success); border-color: rgba(16,212,142,0.25); }
    .status-bar.error    { background: rgba(248,113,113,0.12); color: var(--danger); border-color: rgba(248,113,113,0.25); }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .dot.pulse { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Controls ── */
    .controls { display: flex; gap: 12px; margin-bottom: 28px; }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-family: 'Inter', sans-serif;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-bright); transform: translateY(-1px); }
    .btn-record  { background: rgba(248,113,113,0.15); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
    .btn-record:hover:not(:disabled) { background: rgba(248,113,113,0.25); }
    .btn-record.recording { background: var(--danger); color: #fff; border-color: var(--danger); animation: rec-pulse 1s infinite; }
    @keyframes rec-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)} 50%{box-shadow:0 0 0 8px rgba(248,113,113,0)} }
    .btn-stop { background: var(--muted); color: var(--text-muted); border: 1px solid var(--card-border); }
    .btn-stop:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── Provider badge ── */
    .provider-badges {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .badge {
      font-size: .72rem; font-weight: 600; padding: 4px 10px;
      border-radius: 999px; background: rgba(59,130,246,0.15);
      color: var(--accent-bright); border: 1px solid rgba(59,130,246,0.25);
    }

    /* ── Transcript ── */
    .transcript-section { display: none; }
    .transcript-section h3 {
      font-size: 1rem; color: var(--text-muted); font-weight: 600;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .messages {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      max-height: 320px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: .88rem;
      line-height: 1.5;
      max-width: 90%;
    }
    .msg.interviewer {
      background: var(--muted); color: var(--text);
      border: 1px solid var(--card-border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.respondent {
      background: var(--accent); color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      opacity: .65; margin-bottom: 3px;
    }
    .msg-text { word-break: break-word; }

    /* Scrollbar */
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 999px; }

    /* ── Stimulus panel ── */
    .stimulus-panel {
      display: none;
      border: 1px solid rgba(96,165,250,0.3);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      background: rgba(59,130,246,0.08);
      animation: stimFadeIn .35s ease;
    }
    @keyframes stimFadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .stimulus-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; background: rgba(59,130,246,0.15); font-size: 12px;
      font-weight: 600; color: var(--accent-bright);
    }
    .stimulus-header button {
      background: none; border: none; font-size: 16px; cursor: pointer;
      color: var(--text-muted); line-height: 1;
    }
    .stimulus-header button:hover { color: var(--text); }
    .stimulus-body { padding: 12px; }
    .stimulus-body img { width: 100%; border-radius: 8px; display: block; }
    .stimulus-body iframe {
      width: 100%; border: none; border-radius: 8px; min-height: 300px;
    }
  </style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="logo">🎙️</div>
    <h1 class="wordmark"><span class="accent">Get</span>Heard</h1>
    <p class="tagline">AI-powered voice research interviews · 9 Asian languages</p>
  </div>

  <!-- Language selection -->
  <div class="lang-grid" id="langGrid">
    <button class="lang-btn active" data-lang="en"  onclick="selectLang('en')">🇬🇧 English</button>
    <button class="lang-btn"        data-lang="hi"  onclick="selectLang('hi')">🇮🇳 Hindi</button>
    <button class="lang-btn"        data-lang="id"  onclick="selectLang('id')">🇮🇩 Indonesian</button>
    <button class="lang-btn"        data-lang="fil" onclick="selectLang('fil')">🇵🇭 Filipino</button>
    <button class="lang-btn"        data-lang="th"  onclick="selectLang('th')">🇹🇭 Thai</button>
    <button class="lang-btn"        data-lang="vi"  onclick="selectLang('vi')">🇻🇳 Vietnamese</button>
    <button class="lang-btn"        data-lang="ko"  onclick="selectLang('ko')">🇰🇷 Korean</button>
    <button class="lang-btn"        data-lang="ja"  onclick="selectLang('ja')">🇯🇵 Japanese</button>
    <button class="lang-btn"        data-lang="zh"  onclick="selectLang('zh')">🇨🇳 Mandarin</button>
  </div>

  <!-- Status -->
  <div class="status-bar idle" id="statusBar">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Select a language and start the interview</span>
  </div>

  <!-- Provider info (shown after session starts) -->
  <div class="provider-badges" id="providerBadges" style="display:none;"></div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-primary" id="btnStart" onclick="startInterview()">▶ Start Interview</button>
    <button class="btn btn-record"  id="btnRecord" onclick="toggleRecord()" disabled>🎤 Hold to Record</button>
    <button class="btn btn-stop"    id="btnStop"   onclick="resetSession()" disabled>✕ End</button>
  </div>

  <!-- Stimulus panel (shown when current question has a stimulus_url) -->
  <div class="stimulus-panel" id="stimulusPanel">
    <div class="stimulus-header">
      <span id="stimulusLabel">📎 Please review the following</span>
      <button onclick="hideStimulus()" title="Dismiss">✕</button>
    </div>
    <div class="stimulus-body" id="stimulusBody"></div>
  </div>

  <!-- Transcript -->
  <div class="transcript-section" id="transcriptSection">
    <h3>💬 Conversation</h3>
    <div class="messages" id="messages"></div>
  </div>

</div>

<!-- Hidden audio element for playback -->
<audio id="audioPlayer" style="display:none;"></audio>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let selectedLang       = 'en';
  let sessionId          = null;
  let projectId          = null;
  let mediaRecorder      = null;
  let audioChunks        = [];
  let isRecording        = false;
  let isProcessing       = false;
  let projectQuestions   = [];   // loaded on start, may have stimulus_url per question
  let currentQuestionIdx = 0;

  // ── Read URL params (project_id, language) ─────────────────────────────────
  (function initFromUrl() {
    const p = new URLSearchParams(location.search);
    if (p.get('language')) selectLang(p.get('language'));
    if (p.get('project_id')) {
      projectId = p.get('project_id');
      // Show project banner
      const banner = document.createElement('div');
      banner.style.cssText = 'background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--accent-bright);display:flex;align-items:center;gap:8px;';
      banner.innerHTML = `📋 <strong>Project interview</strong> — custom questions loaded &nbsp;<a href="/projects/${projectId}" style="color:var(--accent-bright);font-size:12px">← back to project</a>`;
      document.querySelector('.card').insertBefore(banner, document.querySelector('.lang-grid'));
    }
  })();

  // ── Language selection ─────────────────────────────────────────────────────
  function selectLang(lang) {
    if (sessionId) return; // lock during interview
    selectedLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
  }

  // ── Hourglass animation ─────────────────────────────────────────────────────
  const HG = ['⏳', '⌛'];
  let _hgTimer = null, _hgIdx = 0;
  function startHourglass(label) {
    stopHourglass();
    _hgIdx = 0;
    setStatus('thinking', HG[0] + ' ' + label + '…');
    _hgTimer = setInterval(() => {
      _hgIdx = (_hgIdx + 1) % HG.length;
      const cur = document.getElementById('statusText').textContent.replace(/^[⏳⌛]\s/, '');
      setStatus('thinking', HG[_hgIdx] + ' ' + cur);
    }, 800);
  }
  function stopHourglass() {
    if (_hgTimer) { clearInterval(_hgTimer); _hgTimer = null; }
  }

  // ── Status helpers ─────────────────────────────────────────────────────────
  function setStatus(state, text) {
    const bar  = document.getElementById('statusBar');
    const dot  = document.getElementById('statusDot');
    const span = document.getElementById('statusText');
    bar.className  = 'status-bar ' + state;
    span.textContent = text;
    dot.className  = 'dot' + (['listening','thinking','speaking'].includes(state) ? ' pulse' : '');
  }

  // ── Message display ────────────────────────────────────────────────────────
  function addMessage(role, text) {
    const sec  = document.getElementById('transcriptSection');
    const msgs = document.getElementById('messages');
    sec.style.display = 'block';
    const el = document.createElement('div');
    el.className = 'msg ' + (role === 'interviewer' ? 'interviewer' : 'respondent');
    el.innerHTML = `
      <div class="msg-label">${role === 'interviewer' ? '🤖 Alex' : '👤 You'}</div>
      <div class="msg-text">${escHtml(text)}</div>`;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Audio playback ─────────────────────────────────────────────────────────
  function playAudio(base64mp3) {
    return new Promise(resolve => {
      const player = document.getElementById('audioPlayer');
      player.src = 'data:audio/mp3;base64,' + base64mp3;
      player.onended = resolve;
      player.onerror = resolve; // resolve even on error so flow continues
      player.play().catch(() => resolve());
    });
  }

  // ── Start interview ────────────────────────────────────────────────────────
  async function startInterview() {
    setStatus('thinking', 'Starting interview…');
    document.getElementById('btnStart').disabled = true;

    try {
      const startUrl = `/api/start?language=${selectedLang}${projectId ? `&project_id=${projectId}` : ''}`;
      const res = await fetch(startUrl, { method: 'POST' });
      if (!res.ok) throw new Error((await res.json()).detail || 'Server error');
      const data = await res.json();

      sessionId = data.session_id;
      projectQuestions = data.project_questions || [];
      currentQuestionIdx = 0;
      // Show stimulus for Q0 if it has one
      _maybeShowStimulus(0);

      // Show provider badges
      const badges = document.getElementById('providerBadges');
      badges.style.display = 'flex';
      badges.innerHTML = `
        <span class="badge">Session: ${data.session_id}</span>
        <span class="badge">STT: ${data.provider_info.stt_provider}</span>
        <span class="badge">TTS: ${data.provider_info.tts_provider}</span>`;

      // Lock language selection
      document.querySelectorAll('.lang-btn').forEach(b => b.disabled = true);
      document.getElementById('btnStop').disabled = false;

      setStatus('speaking', 'Alex is greeting you…');
      // Extract and show greeting text from conversation
      const history = await fetchHistory();
      if (history.length > 0) addMessage('interviewer', history[0].text);

      await playAudio(data.greeting_audio_b64);

      setStatus('ready', 'Your turn — click 🎤 and speak');
      document.getElementById('btnRecord').disabled = false;

    } catch (err) {
      setStatus('error', 'Error: ' + err.message);
      document.getElementById('btnStart').disabled = false;
      console.error(err);
    }
  }

  async function fetchHistory() {
    if (!sessionId) return [];
    try {
      const r = await fetch(`/api/transcript/${sessionId}`);
      if (!r.ok) return [];
      const d = await r.json();
      return d.conversation || [];
    } catch { return []; }
  }

  // ── Recording ──────────────────────────────────────────────────────────────
  async function toggleRecord() {
    if (isProcessing) return;
    if (isRecording) {
      stopRecording();
    } else {
      await startRecording();
    }
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];

      // Prefer WebM/Opus (best browser support); fall back to whatever is available
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm')
        ? 'audio/webm'
        : '';

      mediaRecorder = mimeType
        ? new MediaRecorder(stream, { mimeType })
        : new MediaRecorder(stream);

      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); submitAudio(); };

      mediaRecorder.start(100); // collect chunks every 100 ms
      isRecording = true;

      // Auto-stop at 5 min (hard cap); server handles long audio via long_running_recognize
      const autoStopTimer = setTimeout(() => {
        if (isRecording) {
          setStatus('listening', 'Maximum recording length reached — processing…');
          stopRecording();
        }
      }, 300000);
      mediaRecorder.addEventListener('stop', () => clearTimeout(autoStopTimer), { once: true });

      const btn = document.getElementById('btnRecord');
      btn.textContent = '⏹ Stop Recording';
      btn.classList.add('recording');

      // Speaking timer — updates every second
      let recStart = Date.now();
      const recTimer = setInterval(() => {
        const secs = Math.floor((Date.now() - recStart) / 1000);
        const m = Math.floor(secs / 60), s = secs % 60;
        const ts = m > 0 ? `${m}m ${s}s` : `${s}s`;
        const hint = secs < 90 ? 'aim for 1–2 min' : secs < 120 ? '✓ good length' : '⚠ wrapping up?';
        setStatus('listening', `🎙 Recording ${ts} — ${hint} — click ⏹ when done`);
      }, 1000);
      mediaRecorder.addEventListener('stop', () => clearInterval(recTimer), { once: true });

    } catch (err) {
      setStatus('error', 'Microphone access denied: ' + err.message);
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      isRecording = false;
      const btn = document.getElementById('btnRecord');
      btn.textContent = '🎤 Hold to Record';
      btn.classList.remove('recording');
      btn.disabled = true;
    }
  }

  // ── Submit audio to server ─────────────────────────────────────────────────
  async function submitAudio() {
    if (!audioChunks.length || !sessionId) return;
    isProcessing = true;
    startHourglass('Transcribing and thinking');

    const mimeType = mediaRecorder.mimeType || 'audio/webm';
    const blob = new Blob(audioChunks, { type: mimeType });

    const formData = new FormData();
    formData.append('session_id', sessionId);
    formData.append('audio', blob, 'recording.webm');

    try {
      const res = await fetch('/api/respond', { method: 'POST', body: formData });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Server error');
      }
      const data = await res.json();

      // Show user transcript
      if (data.transcript) addMessage('respondent', data.transcript);

      // Show stimulus if question changed
      if (typeof data.current_question_idx === 'number' && data.current_question_idx !== currentQuestionIdx) {
        currentQuestionIdx = data.current_question_idx;
        _maybeShowStimulus(currentQuestionIdx);
      }

      // Get and show AI response text (load fresh history)
      const history = await fetchHistory();
      const lastAI = [...history].reverse().find(m => m.speaker === 'interviewer');
      if (lastAI) addMessage('interviewer', lastAI.text);

      if (data.is_complete) {
        setStatus('done', 'Interview complete — thank you!');
        document.getElementById('btnRecord').disabled = true;
        await playAudio(data.response_audio_b64);
        return;
      }

      stopHourglass();
      setStatus('speaking', 'Alex is responding…');
      await playAudio(data.response_audio_b64);

      setStatus('ready', 'Your turn — click 🎤 and speak');
      document.getElementById('btnRecord').disabled = false;

    } catch (err) {
      stopHourglass();
      setStatus('error', 'Error: ' + err.message);
      document.getElementById('btnRecord').disabled = false;
      console.error(err);
    } finally {
      isProcessing = false;
    }
  }

  // ── Stimulus ───────────────────────────────────────────────────────────────
  function _maybeShowStimulus(idx) {
    const q = projectQuestions[idx];
    if (q && q.stimulus_url) {
      showStimulus(q.stimulus_url, q.stimulus_label || 'Please review the following');
    } else {
      hideStimulus();
    }
  }

  function showStimulus(url, label) {
    const panel = document.getElementById('stimulusPanel');
    const body  = document.getElementById('stimulusBody');
    document.getElementById('stimulusLabel').textContent = '📎 ' + (label || 'Please review the following');
    body.innerHTML = _stimulusEmbed(url);
    panel.style.display = '';
  }

  function hideStimulus() {
    document.getElementById('stimulusPanel').style.display = 'none';
    document.getElementById('stimulusBody').innerHTML = '';
  }

  function _stimulusEmbed(url) {
    if (!url) return '';
    // Image
    if (/\.(jpg|jpeg|png|gif|webp|svg)(\?|$)/i.test(url)) {
      return `<img src="${escHtml(url)}" alt="Stimulus" loading="lazy">`;
    }
    // YouTube
    const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
    if (ytMatch) {
      return `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" height="320" allowfullscreen></iframe>`;
    }
    // Loom
    const loomMatch = url.match(/loom\.com\/share\/([a-zA-Z0-9]+)/);
    if (loomMatch) {
      return `<iframe src="https://www.loom.com/embed/${loomMatch[1]}" height="320" allowfullscreen></iframe>`;
    }
    // Figma — convert share URL to embed URL
    if (url.includes('figma.com')) {
      const embedUrl = url.includes('embed') ? url : `https://www.figma.com/embed?embed_host=getheard&url=${encodeURIComponent(url)}`;
      return `<iframe src="${escHtml(embedUrl)}" height="420" allowfullscreen></iframe>`;
    }
    // Generic iframe fallback
    return `<iframe src="${escHtml(url)}" height="360"></iframe>`;
  }

  // ── Reset ──────────────────────────────────────────────────────────────────
  async function resetSession() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    // Force-save whatever was recorded before clearing
    if (sessionId) {
      try { await fetch(`/api/end/${sessionId}`, { method: 'POST' }); } catch(e) {}
    }
    sessionId          = null;
    isRecording        = false;
    isProcessing       = false;
    audioChunks        = [];
    projectQuestions   = [];
    currentQuestionIdx = 0;
    hideStimulus();

    document.getElementById('btnStart').disabled   = false;
    document.getElementById('btnRecord').disabled  = true;
    document.getElementById('btnStop').disabled    = true;
    document.getElementById('btnRecord').textContent = '🎤 Hold to Record';
    document.getElementById('btnRecord').classList.remove('recording');
    document.getElementById('messages').innerHTML  = '';
    document.getElementById('transcriptSection').style.display = 'none';
    document.getElementById('providerBadges').style.display = 'none';
    document.querySelectorAll('.lang-btn').forEach(b => b.disabled = false);

    setStatus('idle', 'Select a language and start the interview');
  }
</script>
</body>
</html>
